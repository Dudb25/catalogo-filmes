<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes</title>

    <link rel="stylesheet" href="CSS/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Catálogo de Filmes</h1>
    </header>
    <main>
        <aside id="formulario">
            <div id="aside-top">
                <h2>Adicionar / Editar</h2>
                <img src="src/icons/arrow-hide.svg" alt="Seta para abrir e fechar a barra lateral." id="arrow-hide">
            </div>
            <form action="">
                <div class="item-form" id="titulo">
                    <label for="tituloF">Título do filme</label>
                    <input type="text" id="tituloF" class="tituloF">
                </div>

                <div class="item-form" id="genero">
                    <label for="genero">Gênero</label>
                    <input type="text" id="genero" class="genero">
                </div>

                <div class="item-form" id="status">
                    <label for="status">Status</label>
                    <input type="text" id="status" class="status">
                </div>

                <div class="item-form" id="nota">
                    <label for="nota">Nota</label>
                    <input type="number" id="nota" class="nota">
                </div>

                <button type="submit">
                    <span>
                        <img src="src/icons/plus.svg" alt="Símbolo de mais">
                    </span>
                    <p>Adicionar filme</p>
                </button>
            </form>
        </aside>
        <section id="sessao-de-filmes">
            <article id="container-cards">
                <p>Titulo genero status nota</p>
                <p>Titulo genero status nota</p>
                <p>Titulo genero status nota</p>
                <p>Titulo genero status nota</p>
            </article>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
