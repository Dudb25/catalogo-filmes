<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes</title>
</head>
<body>
    <header>
        <h1>Catálogo de Filmes</h1>
    </header>
    <main>
        <aside>
            <div id="aside-top">
                <h2>Adicionar / Editar</h2>
                <img src="src/icons/arrow-hide.svg" alt="Seta para abrir e fechar a barra lateral.">
            </div>
            <form action="">
                <label for="titulo">Título do filme</label>
                <input type="text" id="titulo" class="titulo">

                <label for="genero">Gênero</label>
                <input type="text" id="genero" class="genero">

                <label for="status">Status</label>
                <input type="text" id="status" class="status">

                <label for="nota">Nota</label>
                <input type="text" id="nota" class="nota">

                <label for="url-poster">Url do poster</label>
                <input type="text" id="url-poster" class="url-poster">

                <button type="submit">
                    <span>
                        <img src="src/icons/plus.svg" alt="Símbolo de mais">
                    </span>
                    <p>Adicionar filme</p>
                </button>
            </form>
        </aside>
        <section id="secao-de-filmes">
            
        </section>
    </main>
</body>
</html>
