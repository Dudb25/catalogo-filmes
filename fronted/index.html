<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes</title>

    <link rel="stylesheet" href="CSS/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Catálogo de Filmes</h1>
        <button id="logout-btn">SAIR</button>
    </header>
    <main>
        <aside id="formulario">
            <div id="aside-top">
                <h2>Adicione um Filme</h2>
                <img src="src/icons/arrow-hide.svg" alt="Seta para abrir e fechar a barra lateral." id="arrow-hide">
            </div>
            <form id="form-filmes">
                <div class="item-form" id="titulo-field">
                    <label for="tituloF">Título do filme</label>
                    <input type="text" id="tituloF" class="tituloF">
                </div>

                <div class="item-form" id="genero-field">
                    <label for="genero">Gênero</label>
                    <input type="text" id="genero" class="genero">
                </div>

                <div class="item-form" id="status-field">
                    <label for="status">Status</label>
                    <input type="text" id="status" class="status">
                </div>

                <div class="item-form" id="nota-field">
                    <label for="nota">Nota</label>
                    <input type="number" id="nota" class="nota">
                </div>

                <button type="submit">
                    <span>
                        <img src="src/icons/plus.svg" alt="Símbolo de mais">
                    </span>
                    <p>Adicionar filme</p>
                </button>
            </form>
        </aside>
        <section id="sessao-de-filmes">

            <input type="text" id="buscar-filme" placeholder="Buscar filme...">

            <article id="container-cards">
                <!-- <div class="card-filmes">
                    <div class="info-filmes">
                        <p>Títitulo</p>
                        <p>Gênero</p>
                        <p>Status</p>
                        <p>Nota</p>
                    </div>
                    <div class="icons">
                        <img class="pencil" src="src/icons/pencil.svg" alt="">
                        <img class="trash" src="src/icons/trash-alt.svg" alt="">
                    </div>
                </div> -->
            </article>
            <div id="paginacao"></div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>

    <div id="popup-excluir">
        <p>Deseja excluir este filme?</p>
        <button id="confirmar-excluir">EXCLUIR</button>
        <button id="cancelar-excluir">CANCELAR</button>
    </div>

    <div id="popup-editar">
        <input type="text" id="editar-titulo" placeholder="Título">
        <input type="text" id="editar-genero" placeholder="Gênero">
        <input type="text" id="editar-status" placeholder="Status">
        <input type="number" id="editar-nota" placeholder="Nota">
        <button id="confirmar-edicao">SALVAR</button>
        <button id="cancelar-edicao">CANCELAR</button>
    </div>

    <div id="overlay"></div>


    
</body>
</html>
