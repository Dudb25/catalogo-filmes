<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CSS/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Login | Catálogo de Filmes</title>
</head>
<body>
    <main id="form-container">
        <h1>Login</h1>
        <form id="login-form">
            <div id="inputs-container">
                <div class="input-field" id="login-field">
                    <label for="loginL">Login</label>
                    <input type="email" id="loginL">
                </div>
                <div class="input-field" id="senha-field">
                    <label for="senhaL">Senha</label>
                    <input type="password" id="senhaL">
                </div>
            </div>

            <div id="error-message"></div>

            <button type="submit">ENTRAR</button>
        </form>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
